<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Wallpaper Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .offline-card {
            background: white;
            border-radius: 30px;
            padding: 40px 30px;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        
        body.dark .offline-card {
            background: #1e293b;
            color: white;
        }
        
        .offline-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        
        h1 {
            font-size: 28px;
            margin-bottom: 15px;
            color: #667eea;
        }
        
        p {
            margin-bottom: 20px;
            line-height: 1.6;
            color: #666;
        }
        
        body.dark p {
            color: #94a3b8;
        }
        
        .retry-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .retry-btn:active {
            transform: scale(0.98);
        }
        
        .saved-wallpapers {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e5e5e5;
        }
        
        body.dark .saved-wallpapers {
            border-top-color: #334155;
        }
        
        .saved-title {
            font-size: 14px;
            color: #999;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="offline-card">
        <div class="offline-icon">📡</div>
        <h1>You're Offline</h1>
        <p>Please check your internet connection to browse new wallpapers.</p>
        <button class="retry-btn" onclick="retryConnection()">🔄 Try Again</button>
        
        <div class="saved-wallpapers">
            <div class="saved-title">✨ Your favorites are saved locally</div>
            <p style="font-size: 12px;">Once you're back online, your saved wallpapers will sync automatically.</p>
        </div>
    </div>
    
    <script>
        function retryConnection() {
            if (navigator.onLine) {
                window.location.href = 'index.html';
            } else {
                alert('Still offline. Please connect to the internet.');
            }
        }
        
        // Listen for online event
        window.addEventListener('online', () => {
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
